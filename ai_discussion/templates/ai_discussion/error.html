{% extends 'ai_discussion/base.html' %}

{% block title %}Ошибка - AI Дискуссии{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body text-center py-5">
                <i class="fas fa-exclamation-triangle fa-4x text-danger mb-4"></i>
                <h1 class="display-5 mb-4">Ошибка</h1>
                <p class="lead mb-4">{{ error }}</p>
                <a href="{% url 'ai_discussion:home' %}" class="btn btn-primary">
                    <i class="fas fa-home me-2"></i>Вернуться на главную
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
