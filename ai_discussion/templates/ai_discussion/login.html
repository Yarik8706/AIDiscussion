{% extends 'ai_discussion/base.html' %}

{% block title %}Вход - AI Дискуссии{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        max-width: 450px;
        margin: 2rem auto;
    }
    .auth-tabs {
        display: flex;
        margin-bottom: 1.5rem;
    }
    .auth-tab {
        flex: 1;
        text-align: center;
        padding: 0.5rem;
        cursor: pointer;
        background-color: #f8f9fa;
        border-bottom: 2px solid #dee2e6;
    }
    .auth-tab.active {
        border-bottom: 2px solid #4c6ef5;
        font-weight: bold;
    }
    .auth-form {
        display: none;
    }
    .auth-form.active {
        display: block;
    }
    .auth-divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 1rem 0;
    }
    .auth-divider::before,
    .auth-divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid #dee2e6;
    }
    .auth-divider span {
        padding: 0 1rem;
        color: #6c757d;
    }
    .social-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
    }
    #debug-output {
        margin-top: 20px;
        padding: 10px;
        background-color: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 5px;
        font-family: monospace;
        white-space: pre-wrap;
    }
</style>
{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="auth-container">
            <div class="card">
                <div class="card-body">
                    <h2 class="text-center mb-4">Доступ к аккаунту</h2>

                    <div class="auth-tabs">
                        <div class="auth-tab active" id="login-tab">Вход</div>
                        <div class="auth-tab" id="register-tab">Регистрация</div>
                    </div>

                    <!-- Форма входа -->
                    <div class="auth-form active" id="login-form">
                        <div class="alert alert-danger d-none" id="login-error"></div>
                        <div class="mb-3">
                            <label for="login-email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="login-email" name="email" autocomplete="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="login-password" class="form-label">Пароль</label>
                            <input type="password" class="form-control" id="login-password" name="password" autocomplete="current-password" required>
                        </div>
                        <button type="button" id="login-button" class="btn btn-primary w-100">Войти</button>
                        
                        <div class="auth-divider">
                            <span>или</span>
                        </div>
                        
                        <button type="button" id="google-login-button" class="btn btn-outline-secondary w-100 social-btn">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18" alt="Google">
                            Войти с Google
                        </button>
                    </div>

                    <!-- Форма регистрации -->
                    <div class="auth-form" id="register-form">
                        <div class="alert alert-danger d-none" id="register-error"></div>
                        <div class="mb-3">
                            <label for="register-email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="register-email" name="email" autocomplete="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="register-password" class="form-label">Пароль</label>
                            <input type="password" class="form-control" id="register-password" name="new-password" autocomplete="new-password" required>
                        </div>
                        <div class="mb-3">
                            <label for="register-password-confirm" class="form-label">Подтверждение пароля</label>
                            <input type="password" class="form-control" id="register-password-confirm" name="new-password-confirm" autocomplete="new-password" required>
                        </div>
                        <button type="button" id="register-button" class="btn btn-primary w-100">Зарегистрироваться</button>
                    </div>

                    <!-- Отладочная информация -->
                    <div id="debug-output" class="mt-4"></div>
                    
                    <!-- Отладочные кнопки -->
                    <div class="mt-3 pt-3 border-top">
                        <h5>Отладочные действия</h5>
                        <div class="d-flex gap-2">
                            <button id="check-auth-btn" class="btn btn-sm btn-outline-secondary">Проверить аутентификацию</button>
                            <button id="clear-debug-btn" class="btn btn-sm btn-outline-danger">Очистить отладку</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// Отладочная функция
function debug(message) {
    const debugOutput = document.getElementById('debug-output');
    const timestamp = new Date().toLocaleTimeString();
    debugOutput.innerHTML += `[${timestamp}] ${message}<br>`;
    console.log(`[${timestamp}] ${message}`);
}

debug("Скрипт начал выполнение");

// Проверка конфигурации Firebase
debug(`Проверка Firebase: ${typeof firebase !== 'undefined' ? 'Firebase доступен' : 'Firebase не доступен'}`);
debug(`Конфигурация: API_KEY ${typeof firebaseConfig !== 'undefined' && firebaseConfig.apiKey ? 'присутствует' : 'отсутствует'}`);

document.addEventListener('DOMContentLoaded', function() {
    debug("DOM полностью загружен");
    
    // Ensure Firebase is available
    function waitForFirebase(callback, maxAttempts = 10) {
        let attempts = 0;
        
        function checkFirebase() {
            attempts++;
            if (typeof firebase !== 'undefined' && firebase.auth) {
                debug("Firebase доступен, продолжаем");
                callback();
                return;
            } else if (attempts < maxAttempts) {
                debug(`Firebase еще не инициализирован, попытка ${attempts}/${maxAttempts}`);
                setTimeout(checkFirebase, 200);
            } else {
                debug("Firebase не инициализирован после всех попыток");
                showError(loginError, "Ошибка загрузки Firebase SDK. Перезагрузите страницу.");
            }
        }
        
        checkFirebase();
    }
    
    // UI элементы
    const loginTab = document.getElementById('login-tab');
    const registerTab = document.getElementById('register-tab');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const loginButton = document.getElementById('login-button');
    const registerButton = document.getElementById('register-button');
    const googleLoginButton = document.getElementById('google-login-button');
    const loginError = document.getElementById('login-error');
    const registerError = document.getElementById('register-error');
    
    if (!loginTab || !registerTab) {
        debug("Ошибка: не найдены табы входа/регистрации");
        return;
    }

    // Переключение между вкладками
    loginTab.addEventListener('click', () => {
        debug("Клик по табу входа");
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        loginForm.classList.add('active');
        registerForm.classList.remove('active');
    });

    registerTab.addEventListener('click', () => {
        debug("Клик по табу регистрации");
        registerTab.classList.add('active');
        loginTab.classList.remove('active');
        registerForm.classList.add('active');
        loginForm.classList.remove('active');
    });

    // Функция для показа ошибки
    function showError(element, message) {
        element.textContent = message;
        element.classList.remove('d-none');
        debug(`Показана ошибка: ${message}`);
    }

    // Функция для скрытия ошибки
    function hideError(element) {
        element.classList.add('d-none');
    }

    // Вход по email/пароль
    loginButton.addEventListener('click', () => {
        debug("Клик по кнопке входа");
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        
        if (!email || !password) {
            debug("Ошибка: email или пароль не заполнены");
            showError(loginError, "Пожалуйста, заполните все поля");
            return;
        }
        
        debug(`Попытка входа с email: ${email}`);
        hideError(loginError);
        
        waitForFirebase(() => {
            try {
                // Log Firebase config for debugging
                debug("Firebase config: " + JSON.stringify(firebaseConfig));
                
                firebase.auth().signInWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        debug("Вход успешен, получение токена");
                        userCredential.user.getIdToken().then(token => {
                            localStorage.setItem('firebaseToken', token);
                            debug("Токен сохранен, перенаправление");
                            
                            // Ensure we don't get caught in a refresh loop
                            sessionStorage.setItem('userSessionChecked', 'true');
                            
                            window.location.href = '{% url "ai_discussion:home" %}';
                        });
                    })
                    .catch((error) => {
                        debug(`Ошибка входа: ${error.code} - ${error.message}`);
                        showError(loginError, error.message);
                    });
            } catch (error) {
                debug(`Критическая ошибка при входе: ${error.message}`);
                showError(loginError, "Произошла ошибка при попытке входа");
            }
        });
    });

    // Регистрация
    registerButton.addEventListener('click', () => {
        debug("Клик по кнопке регистрации");
        const email = document.getElementById('register-email').value;
        const password = document.getElementById('register-password').value;
        const passwordConfirm = document.getElementById('register-password-confirm').value;
        
        hideError(registerError);
        
        if (!email || !password || !passwordConfirm) {
            debug("Ошибка: не все поля заполнены");
            showError(registerError, "Пожалуйста, заполните все поля");
            return;
        }
        
        if (password !== passwordConfirm) {
            debug("Ошибка: пароли не совпадают");
            showError(registerError, 'Пароли не совпадают');
            return;
        }
        
        debug(`Попытка регистрации с email: ${email}`);
        
        waitForFirebase(() => {
            try {
                // Log Firebase config for debugging
                debug("Firebase config: " + JSON.stringify(firebaseConfig));
                
                firebase.auth().createUserWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        debug("Регистрация успешна, получение токена");
                        // Отмечаем, что пользователь только что зарегистрировался
                        sessionStorage.setItem('justSignedIn', 'true');
                        
                        userCredential.user.getIdToken().then(token => {
                            localStorage.setItem('firebaseToken', token);
                            debug("Токен сохранен, перенаправление");
                            
                            // Ensure we don't get caught in a refresh loop
                            sessionStorage.setItem('userSessionChecked', 'true');
                            
                            window.location.href = '{% url "ai_discussion:home" %}';
                        });
                    })
                    .catch((error) => {
                        debug(`Ошибка регистрации: ${error.code} - ${error.message}`);
                        showError(registerError, error.message);
                    });
            } catch (error) {
                debug(`Критическая ошибка при регистрации: ${error.message}`);
                showError(registerError, "Произошла ошибка при попытке регистрации");
            }
        });
    });

    // Вход через Google
    googleLoginButton.addEventListener('click', () => {
        debug("Клик по кнопке входа через Google");
        
        waitForFirebase(() => {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                debug("Создан провайдер Google");
                
                firebase.auth().signInWithPopup(provider)
                    .then((result) => {
                        if (result && result.user) {
                            debug("Вход через Google успешен, получение токена");
                            
                            // Проверяем, новый ли это пользователь
                            if (result.additionalUserInfo.isNewUser) {
                                sessionStorage.setItem('justSignedIn', 'true');
                                debug("Новый пользователь через Google");
                            }
                            
                            result.user.getIdToken()
                                .then(token => {
                                    localStorage.setItem('firebaseToken', token);
                                    debug("Токен сохранен, перенаправление");
                                    
                                    // Ensure we don't get caught in a refresh loop
                                    sessionStorage.setItem('userSessionChecked', 'true');
                                    
                                    window.location.href = '{% url "ai_discussion:home" %}';
                                })
                                .catch(tokenError => {
                                    debug(`Ошибка получения токена: ${tokenError.message}`);
                                    showError(loginError, "Не удалось получить токен авторизации");
                                });
                        } else {
                            debug("Пользователь не получен после входа через Google");
                            showError(loginError, "Не удалось получить данные пользователя");
                        }
                    })
                    .catch((error) => {
                        // Игнорируем ошибку закрытия окна пользователем
                        if (error.code === "auth/popup-closed-by-user") {
                            debug("Пользователь закрыл окно авторизации Google");
                            return;
                        }
                        
                        debug(`Ошибка входа через Google: ${error.code} - ${error.message}`);
                        showError(loginError, error.message);
                    });
            } catch (error) {
                debug(`Критическая ошибка при входе через Google: ${error.message}`);
                showError(loginError, "Произошла ошибка при попытке входа через Google");
            }
        });
    });
    
    // Watch for auth changes from firebase redirect result
    waitForFirebase(() => {
        firebase.auth().getRedirectResult()
            .then((result) => {
                if (result && result.user) {
                    debug("Вход через редирект успешен, получение токена");
                    
                    // Проверяем, новый ли это пользователь
                    if (result.additionalUserInfo && result.additionalUserInfo.isNewUser) {
                        sessionStorage.setItem('justSignedIn', 'true');
                        debug("Новый пользователь через редирект");
                    }
                    
                    result.user.getIdToken().then(token => {
                        localStorage.setItem('firebaseToken', token);
                        debug("Токен сохранен, перенаправление");
                        
                        // Ensure we don't get caught in a refresh loop
                        sessionStorage.setItem('userSessionChecked', 'true');
                        
                        window.location.href = '{% url "ai_discussion:home" %}';
                    });
                }
            })
            .catch((error) => {
                if (error.code !== "auth/credential-already-in-use") {
                    debug(`Ошибка получения результата редиректа: ${error.code} - ${error.message}`);
                }
            });
    });
        
    // Отладочная кнопка для проверки аутентификации
    document.getElementById('check-auth-btn').addEventListener('click', function() {
        debug("Проверяем состояние аутентификации...");
        
        // Проверить текущего пользователя Firebase
        const currentUser = firebase.auth().currentUser;
        debug(`Текущий пользователь Firebase: ${currentUser ? currentUser.email : 'нет'}`);
        
        // Проверить наличие токена в localStorage
        const token = localStorage.getItem('firebaseToken');
        debug(`Токен в localStorage: ${token ? 'присутствует' : 'отсутствует'}`);
        
        // Запрос к серверу для проверки состояния аутентификации
        fetch('{% url "ai_discussion:auth_debug" %}')
            .then(response => response.json())
            .then(data => {
                debug(`Ответ сервера: ${JSON.stringify(data, null, 2)}`);
            })
            .catch(error => {
                debug(`Ошибка запроса к серверу: ${error.message}`);
            });
    });
    
    // Очистка отладочной информации
    document.getElementById('clear-debug-btn').addEventListener('click', function() {
        document.getElementById('debug-output').innerHTML = '';
        debug("Отладочная информация очищена");
    });
});
</script>
{% endblock %}
